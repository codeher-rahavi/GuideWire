<!DOCTYPE html>
<html>
<head>
    <title>Claims</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="dashboard-container">

<h2>⚡ Claim Simulation</h2>

<div class="buttons">
    <button onclick="trigger()">Check Weather & Claim</button>
</div>

<div id="result-box"></div>

<button onclick="goBack()">← Back</button>

<script>
function goBack() {
    window.history.back();
}
</script>

</div>

<script>
function trigger() {
    fetch('/trigger?city={{ city }}')
    .then(res => res.json())
    .then(data => {
        document.getElementById("result-box").innerHTML =
            data.message + " | ₹" + data.payout;
    });
}
</script>

</body>
</html>
