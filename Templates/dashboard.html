<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="dashboard-container">

    <!-- Header -->
    <div class="dashboard-header">
        <h2>👋 Welcome, {{ name }}</h2>
        <p>📍 {{ city }} | ⏳ Plan Active (7 days)</p>
    </div>

    <!-- Cards -->
    <div class="dashboard-cards">

        <div class="card-box">
            <h3>Risk Level</h3>
            <p class="value">{{ risk }}</p>
        </div>

        <div class="card-box">
            <h3>Weekly Premium</h3>
            <p class="value">₹{{ premium }}</p>
        </div>

        <div class="card-box">
            <h3>Status</h3>
            <p class="value green">Active ✅</p>
        </div>

        <div class="card-box">
            <h3>Earnings Protected</h3>
            <p class="value">₹1200</p>
        </div>

    </div>

    <!-- Action Section -->
    <div class="action-section">
        <h3>⚡ Simulate Disruption</h3>

        <div class="buttons">
           <a href="/claim/rain?city={{ city }}">
    <button>🌧 Rain</button>
</a>

<a href="/claim/heat?city={{ city }}">
    <button>🌡 Heatwave</button>
</a>

<a href="/claim/pollution?city={{ city }}">
    <button>🌫 Pollution</button>
</a>
        </div>

        <div id="result-box"></div>
        <div class="chart-section">
    <h3>📊 Weekly Earnings Protection</h3>
    <canvas id="myChart"></canvas>
</div>
    </div>

</div>
<script>
function trigger(type) {
    const city = "{{ city }}";

    fetch('/trigger?city=' + city)
    .then(response => response.json())
    .then(data => {
        document.getElementById("result-box").innerHTML =
            "<div class='result-card'>⚡ " + data.message +
            "<br>💸 Payout: ₹" + data.payout + "</div>";
    });
}

// Chart.js code
const ctx = document.getElementById('myChart');

new Chart(ctx, {
    type: 'bar',
    data: {
        labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
        datasets: [{
            label: 'Protected Earnings (₹)',
            data: [200, 300, 150, 400, 250, 350, 300],
            borderWidth: 1
        }]
    },
    options: {
        responsive: true
    }
});
</script>

</body>
</html>
